trigger:
  branches:
    include: [main]
pr:
  branches:
    include: [main]
pool:
  vmImage: ubuntu-latest
steps:
  - checkout: self
  - script: |
      test -f src/index.html
      grep -q "MKVA" src/index.html
      grep -q "Member Management" src/index.html
    displayName: Validate application
  - task: Docker@2
    displayName: Build container
    inputs:
      command: build
      repository: mkva-member-management
      Dockerfile: Dockerfile
      tags: |
        $(Build.BuildId)
        latest

